events {}

http {
    resolver <ur ip> valid=10s;

    server {
        listen 80;
        server_name openrouter.backend.com;

        location / {
            set $primary_backend http://primary-backend:3000;
            proxy_pass $primary_backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    server {
        listen 80;
        server_name openrouter.api.com;

        location / {
            set $api_backend http://api-backend:3002;
            proxy_pass $api_backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    server {
        listen 80;
        server_name openrouter.ronak.com;

        location / {
            set $frontend http://frontend:80;
            proxy_pass $frontend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}